<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Accessories Premium</title>

<style>
body {margin:0;font-family:Poppins;background:#0d0d0d;color:white;}
header {background:black;padding:15px;position:sticky;top:0;}
nav {display:flex;justify-content:space-between;}
nav h2 {color:red;}

.hero {
height:90vh;
background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1 {font-size:45px;}

.btn {
background:red;
padding:12px 20px;
color:white;
border:none;
margin:5px;
}

.products {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card {
background:#1a1a1a;
padding:15px;
border-radius:10px;
transition:0.3s;
}

.card:hover {transform:scale(1.05);}

.card img {
width:100%;
border-radius:10px;
}

.whatsapp {
position:fixed;
bottom:20px;
right:20px;
background:green;
padding:15px;
border-radius:50%;
}
</style>
</head>

<body>

<header>
<nav>
<h2>Car Accessories</h2>
</nav>
</header>

<section class="hero">
<h1>Upgrade Your Car 🚗</h1>
<p>Premium Accessories | Best Prices</p>

<a href="tel:9625302177"><button class="btn">Call Now</button></a>
<a href="https://wa.me/919625302177"><button class="btn">WhatsApp</button></a>
</section>

<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c">
<h3>Car Speakers</h3>
<button class="btn" onclick="orderNow('Car Speakers')">Order Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1580273916550-e323be2ae537">
<h3>LED Lights</h3>
<button class="btn" onclick="orderNow('LED Lights')">Order Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2">
<h3>Seat Covers</h3>
<button class="btn" onclick="orderNow('Seat Covers')">Order Now</button>
</div>

</section>

<a class="whatsapp" href="https://wa.me/919625302177">💬</a>

<script>
function orderNow(product) {
let phone="919625302177";
let message="Hello, I want to order: "+product;
let url="https://wa.me/"+phone+"?text="+encodeURIComponent(message);
window.open(url,'_blank');
}
</script>

</body>
</html>
